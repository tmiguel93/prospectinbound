services:
  crm:
    build:
      context: .
    image: prospectinbound-crm:local
    environment:
      HOST: 0.0.0.0
      PORT: 3000
      DATABASE_URL: file:../../data/crm-local.db
      JWT_SECRET: ${JWT_SECRET:?Defina JWT_SECRET com ao menos 32 caracteres no arquivo .env.docker}
    ports:
      - '127.0.0.1:3000:3000'
    volumes:
      - crm_data:/app/data
      - crm_backups:/app/backups
    restart: unless-stopped
    healthcheck:
      test:
        [
          'CMD',
          'node',
          '-e',
          "fetch('http://localhost:3000/health').then((response) => process.exit(response.ok ? 0 : 1)).catch(() => process.exit(1))"
        ]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s

volumes:
  crm_data:
  crm_backups:
